apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: dashboard
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Uncomment to enable TLS via cert-manager (bonus)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # Uncomment for TLS (bonus)
  # tls:
  #   - hosts:
  #       - dashboard-prod.<YOUR_DOMAIN>
  #       - dashboard-staging.<YOUR_DOMAIN>
  #     secretName: dashboard-tls
  rules:
    - host: <SCOPE_A>.<YOUR_DOMAIN>       # replace with your first domain, e.g. team-a.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-svc
                port:
                  number: 80
    - host: <SCOPE_B>.<YOUR_DOMAIN>       # replace with your second domain, e.g. infra.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-svc
                port:
                  number: 80
