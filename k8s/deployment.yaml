apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: dashboard
  labels:
    app: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      serviceAccountName: dashboard-sa
      containers:
        - name: dashboard
          image: <REGISTRY>/<IMAGE_NAME>:<IMAGE_TAG>
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DOMAIN_K8S
              value: "<K8S_DOMAIN>"    # e.g. k8s.example.com
            - name: DOMAIN_S3
              value: "<S3_DOMAIN>"     # e.g. s3.example.com
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: dashboard
